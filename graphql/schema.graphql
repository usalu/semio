}

type Quality implements Node {
  name: String!
  value: String!
  definition: String!
  unit: String!
  type: Type
  design: Design

  """The ID of the object"""
  id: ID!
}

"""
◳ A coordinate system is an origin (point) and an orientation (x-axis and y-axis).
"""
type CoordinateSystemNode {
  origin: PointNode!
  xAxis: VectorNode!
  yAxis: VectorNode!
}

"""✖️ A 3d-point (xyz) of floating point numbers."""
type PointNode {
  x: Float!
  y: Float!
  z: Float!
}

"""➡️ A 3d-vector (xyz) of floating point numbers."""
type VectorNode {
  x: Float!
  y: Float!
  z: Float!
}

"""✏️ The diagram of a piece."""
type PieceDiagramNode {
  point: ScreenPointNode!
}

"""📺 A 2d-point (xy) of integers in screen coordinate system."""
type ScreenPointNode {
  x: Int!
  y: Int!
}

type SideNode {
  piece: SidePieceNode!
}

type SidePieceNode {
  id: String!
  type: SidePieceTypeNode!
}

type SidePieceTypeNode {
  port: Port
}

type DesignNodeConnection {
  """Pagination data for this connection."""
  pageInfo: PageInfo!

  """Contains the nodes in this connection."""
  edges: [DesignNodeEdge]!
}

"""A Relay edge containing a `DesignNode` and its cursor."""
type DesignNodeEdge {
  """The item at the end of the edge"""
  node: Design

  """A cursor for use in pagination"""
  cursor: String!
}

input KitInput {
  name: String!
  description: String = ""
  icon: String = ""
  createdAt: DateTime = null
  lastUpdateAt: DateTime = null
  url: String = ""
  homepage: String = ""
  types: [TypeInput] = null
}

input TypeInput {
  name: String!
  description: String = ""
  icon: String = ""
  createdAt: DateTime = null
  lastUpdateAt: DateTime = null
  variant: String = ""
  representations: [RepresentationInput] = null
}

input RepresentationInput {
  url: String!
  lod: String = ""
  tags: [String] = null
}