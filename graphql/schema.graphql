type Query {
  node(
    """The ID of the object"""
    id: ID!
  ): Node
}

interface Node {
  """The ID of the object"""
  id: ID!
}

type Mutation {
  createKit(kit: KitInput!): Kit
}

type Kit implements Node {
  name: String!
  description: String!
  icon: String!
  createdAt: DateTime!
  lastUpdateAt: DateTime!
  url: String!
  homepage: String!
  types(before: String, after: String, first: Int, last: Int): TypeNodeConnection
  designs(before: String, after: String, first: Int, last: Int): DesignNodeConnection

  """The ID of the object"""
  id: ID!
}

"""
The `DateTime` scalar type represents a DateTime
value as specified by
[iso8601](https://en.wikipedia.org/wiki/ISO_8601).
"""
scalar DateTime

type TypeNodeConnection {
  """Pagination data for this connection."""
  pageInfo: PageInfo!

  """Contains the nodes in this connection."""
  edges: [TypeNodeEdge]!
}

"""
The Relay compliant `PageInfo` type, containing data necessary to paginate this connection.
"""
type PageInfo {
  """When paginating forwards, are there more items?"""
  hasNextPage: Boolean!

  """When paginating backwards, are there more items?"""
  hasPreviousPage: Boolean!

  """When paginating backwards, the cursor to continue."""
  startCursor: String

  """When paginating forwards, the cursor to continue."""
  endCursor: String
}

"""A Relay edge containing a `TypeNode` and its cursor."""
type TypeNodeEdge {
  """The item at the end of the edge"""
  node: Type

  """A cursor for use in pagination"""
  cursor: String!
}

type Type implements Node {
  name: String!
  description: String!
  icon: String!
  createdAt: DateTime!
  lastUpdateAt: DateTime!
  variant: String!
  representations(before: String, after: String, first: Int, last: Int): RepresentationNodeConnection
  ports(before: String, after: String, first: Int, last: Int): PortNodeConnection
  qualities(before: String, after: String, first: Int, last: Int): QualityNodeConnection
  kit: Kit

  """The ID of the object"""
  id: ID!
}

type RepresentationNodeConnection {
  """Pagination data for this connection."""
  pageInfo: PageInfo!

  """Contains the nodes in this connection."""
  edges: [RepresentationNodeEdge]!
}

"""A Relay edge containing a `RepresentationNode` and its cursor."""
type RepresentationNodeEdge {
  """The item at the end of the edge"""
  node: Representation

  """A cursor for use in pagination"""
  cursor: String!
}

type Representation implements Node {
  url: String!
  lod: String!
  type: Type

  """The ID of the object"""
  id: ID!
  tags: [String!]!
}

type PortNodeConnection {
  """Pagination data for this connection."""
  pageInfo: PageInfo!

  """Contains the nodes in this connection."""
  edges: [PortNodeEdge]!
}

"""A Relay edge containing a `PortNode` and its cursor."""
type PortNodeEdge {
  """The item at the end of the edge"""
  node: Port

  """A cursor for use in pagination"""
  cursor: String!
}

type Port implements Node {
  id_: String
  type: Type
  locators(before: String, after: String, first: Int, last: Int): LocatorNodeConnection
  connecteds(before: String, after: String, first: Int, last: Int): ConnectionNodeConnection
  connectings(before: String, after: String, first: Int, last: Int): ConnectionNodeConnection

  """The ID of the object"""
  id: ID!
  point: PointNode!
  direction: VectorNode!
}

type LocatorNodeConnection {
  """Pagination data for this connection."""
  pageInfo: PageInfo!

  """Contains the nodes in this connection."""
  edges: [LocatorNodeEdge]!
}

"""A Relay edge containing a `LocatorNode` and its cursor."""
type LocatorNodeEdge {
  """The item at the end of the edge"""
  node: Locator

  """A cursor for use in pagination"""
  cursor: String!
}

type Locator implements Node {
  subgroup: String!
  group: String!
  port: Port

  """The ID of the object"""
  id: ID!
}

type ConnectionNodeConnection {
  """Pagination data for this connection."""
  pageInfo: PageInfo!

  """Contains the nodes in this connection."""
  edges: [ConnectionNodeEdge]!
}

"""A Relay edge containing a `ConnectionNode` and its cursor."""
type ConnectionNodeEdge {
  """The item at the end of the edge"""
  node: Connection

  """A cursor for use in pagination"""
  cursor: String!
}

type Connection implements Node {
  rotation: Float!
  offset: Float!
  connectedPiece: Piece
  connectedPieceTypePort: Port
  connectingPiece: Piece
  connectingPieceTypePort: Port
  design: Design

  """The ID of the object"""
  id: ID!
  connected: SideNode!
  connecting: SideNode!
}

type Piece implements Node {
  id_: String
  design: Design
  connecteds(before: String, after: String, first: Int, last: Int): ConnectionNodeConnection
  connectings(before: String, after: String, first: Int, last: Int): ConnectionNodeConnection

  """The ID of the object"""
  id: ID!
  coordinateSystem: CoordinateSystemNode!
  diagram: PieceDiagramNode!
}

type Design implements Node {
  name: String!
  description: String!
  icon: String!
  createdAt: DateTime!
  lastUpdateAt: DateTime!
  variant: String!
  pieces(before: String, after: String, first: Int, last: Int): PieceNodeConnection
  connections(before: String, after: String, first: Int, last: Int): ConnectionNodeConnection
  qualities(before: String, after: String, first: Int, last: Int): QualityNodeConnection
  kit: Kit

  """The ID of the object"""
  id: ID!
}

