  NO_PERMISSION_TO_UPDATE_KIT
  KIT_METADATA_IS_INVALID
}

"""🗃️ Meta-data of a kit."""
input KitMetadataInput {
  name: String
  description: String
  icon: String
  url: String
  homepage: String
}

type DeleteLocalKitMutation {
  error: DeleteLocalKitError
}

